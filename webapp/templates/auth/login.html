{% extends "base.html" %}
{% block title %}Login — VAAS{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card mt-5"><div class="card-body">
      <h4 class="card-title">VAAS Login</h4>
      <form method="post">
        <div class="mb-3"><label class="form-label">Username</label>
          <input class="form-control" name="username" required autofocus></div>
        <div class="mb-3"><label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required></div>
        <button class="btn btn-primary w-100">Sign in</button>
      </form>
    </div></div>
  </div>
</div>
{% endblock %}
