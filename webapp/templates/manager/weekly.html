{% extends "base.html" %}
{% from "manager/_report_macro.html" import report_table %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Weekly Attendance</h3>
  <div>
    <a class="btn btn-outline-secondary btn-sm"
       href="{{ url_for('manager.export_csv_route', report_type='weekly', week_start=week_start.isoformat()) }}">CSV</a>
    <a class="btn btn-outline-secondary btn-sm"
       href="{{ url_for('manager.export_pdf_route', report_type='weekly', week_start=week_start.isoformat()) }}">PDF</a>
  </div>
</div>
<form class="row g-2 mb-3">
  <div class="col-auto"><input type="date" name="week_start" value="{{ week_start }}" class="form-control"></div>
  <div class="col-auto"><button class="btn btn-primary">Filter</button></div>
</form>
{{ report_table(rows, ['plate_number','period','total_hours','entry_count','on_time_count','late_count','compliance_rate']) }}
{% endblock %}
