{% macro report_table(rows, fields) %}
<div class="report-table-wrap">
  <table class="vaas-table">
    <thead>
      <tr>
        {% for f in fields %}
          <th>{{ f|replace('_',' ')|title }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
    {% for r in rows %}
      <tr>
        {% for f in fields %}
          <td style="
            {% if f == 'plate_number' %}font-family:var(--font-mono);font-weight:600;color:#fff;
            {% elif f in ('compliance_rate',) %}color:var(--green);font-family:var(--font-mono);
            {% elif f in ('total_hours','avg_dwell') %}color:var(--cyan);font-family:var(--font-mono);
            {% elif f in ('late_count','exception_count') %}color:var(--amber);font-family:var(--font-mono);
            {% else %}color:var(--text-secondary);
            {% endif %}font-size:.8rem">
            {{ r[f] if r is mapping else r.__dict__[f] }}
          </td>
        {% endfor %}
      </tr>
    {% else %}
      <tr>
        <td colspan="{{ fields|length }}"
            style="text-align:center;padding:2.5rem;color:var(--text-muted)">
          <i class="bi bi-inbox" style="font-size:1.5rem;display:block;margin-bottom:.5rem"></i>
          No data for the selected period.
        </td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endmacro %}
